# ============================================================
# 科技马前卒 · 文章自动生成 GitHub Actions Workflow
#
# 触发方式：
#   1. 手动触发：Actions → Run workflow → 输入话题
#   2. Issue 触发：创建标题为话题的 Issue，加上 "generate" 标签
#   3. 钉钉触发：钉钉 → Cloudflare Worker → 创建 Issue → 自动触发
# ============================================================

name: 生成公众号文章

on:
  # 手动触发：在 GitHub Actions 页面点击 Run workflow
  workflow_dispatch:
    inputs:
      topic:
        description: '话题（如：美联储降息、特朗普关税）'
        required: true
        type: string
      source:
        description: '主要来源'
        required: false
        default: '综合'
        type: choice
        options:
          - 综合
          - Bloomberg
          - WSJ
          - NYT
          - Economist
          - Reuters
          - FT
      publish_wx:
        description: '发布到公众号草稿箱'
        required: false
        default: true
        type: boolean
      publish_gh:
        description: '发布到 GitHub 网站'
        required: false
        default: true
        type: boolean

  # Issue 触发：创建带 "generate" 标签的 Issue
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Issue 触发时只处理带 "generate" 标签的
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && contains(github.event.label.name, 'generate'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 【修改 1】：增加 pysocks 依赖，使得 Python requests 能识别 socks5 代理
      - name: Install dependencies
        run: pip install requests openai pysocks

      - name: Determine topic
        id: topic
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TOPIC="${{ github.event.inputs.topic }}"
            SOURCE="${{ github.event.inputs.source }}"
            PUB_WX="${{ github.event.inputs.publish_wx }}"
            PUB_GH="${{ github.event.inputs.publish_gh }}"
          else
            TOPIC="${{ github.event.issue.title }}"
            BODY="${{ github.event.issue.body }}"
            SOURCE="综合"
            PUB_WX="true"
            PUB_GH="true"
            # 从 Issue body 解析参数（可选）
            if echo "$BODY" | grep -qi "source:"; then
              SOURCE=$(echo "$BODY" | grep -i "source:" | head -1 | sed 's/.*source:\s*//i' | xargs)
            fi
          fi
          echo "topic=$TOPIC" >> $GITHUB_OUTPUT
          echo "source=$SOURCE" >> $GITHUB_OUTPUT
          echo "pub_wx=$PUB_WX" >> $GITHUB_OUTPUT
          echo "pub_gh=$PUB_GH" >> $GITHUB_OUTPUT
          echo "话题: $TOPIC / 来源: $SOURCE"

      # 【新增 Step】：连接你的 14.103.xx.xx 服务器，建立后台 SOCKS5 代理隧道
      - name: Setup SSH Proxy Tunnel
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          # 将你的服务器加入 known_hosts 避免第一次连接时的确认提示
          ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts
          # 建立后台动态端口转发 (SOCKS5 代理到本地 1080 端口)
          # 参数解释: -D(动态代理) -q(静默) -C(压缩) -N(不执行远程命令) -f(后台运行)
          ssh -D 1080 -q -C -N -f -i ~/.ssh/id_rsa $SERVER_USER@$SERVER_IP
          echo "SSH SOCKS5 代理已在本地 1080 端口启动"
          
          # 可选验证：测试当前外网IP是否已经变成你的服务器IP
          # curl --socks5-hostname 127.0.0.1:1080 https://api.ipify.org

      - name: Generate and publish article
        env:
          # 【修改 2】：配置全局代理环境变量，让后续 Python 脚本的网络请求全部走刚才建立的 SSH 代理
          http_proxy: socks5h://127.0.0.1:1080
          https_proxy: socks5h://127.0.0.1:1080
          all_proxy: socks5h://127.0.0.1:1080
          
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          WX_APPID: ${{ secrets.WX_APPID }}
          WX_APPSECRET: ${{ secrets.WX_APPSECRET }}
          WX_THUMB_MEDIA_ID: ${{ secrets.WX_THUMB_MEDIA_ID }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: |
          PUB_WX_FLAG=""
          PUB_GH_FLAG=""
          if[ "${{ steps.topic.outputs.pub_wx }}" = "false" ]; then
            PUB_WX_FLAG="--no-wx"
          fi
          if [ "${{ steps.topic.outputs.pub_gh }}" = "false" ]; then
            PUB_GH_FLAG="--no-gh"
          fi

          python tools/gzh_news_writer.py gen \
            "${{ steps.topic.outputs.topic }}" \
            --source "${{ steps.topic.outputs.source }}" \
            $PUB_WX_FLAG $PUB_GH_FLAG \
            --save output.md 2>&1 | tee generate.log

      - name: Comment on Issue
        if: github.event_name == 'issues'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let log = '';
            try { log = fs.readFileSync('generate.log', 'utf8'); } catch(e) {}

            const lines = log.split('\n');
            const titleLine = lines.find(l => l.includes('标题:'));
            const urlLine = lines.find(l => l.includes('网站:'));
            const wxLine = lines.find(l => l.includes('公众号:'));

            let comment = '## ✅ 文章已生成\n\n';
            if (titleLine) comment += `**${titleLine.trim()}**\n\n`;
            if (urlLine) comment += `🔗 ${urlLine.trim()}\n\n`;
            if (wxLine) comment += `📱 ${wxLine.trim()}\n\n`;
            comment += '<details><summary>运行日志</summary>\n\n```\n' + log.slice(-2000) + '\n```\n</details>';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
              labels: ['generate', 'done']
            });
